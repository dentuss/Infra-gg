name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve for the team?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - Dashboard
        - Calendar
        - Documents
        - Strategy Board
        - Team Management
        - Other
    validations:
      required: true
