name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    name: Typecheck, lint, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build
        run: npm run build
        env:
          # Publishable values — safe to commit; Row Level Security guards the data.
          NEXT_PUBLIC_SUPABASE_URL: https://mlpvwaxedcjqvjxtzfss.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_JopNs71pTrFjZu_89h9_Qg_8bYzBcY4

# Deployment is handled by the Vercel Git integration: every push to
# master deploys to production, and master only moves via CI-green PRs.
